name: Central KiCad CI
on:
  workflow_call:

jobs:
  kicad-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Board Repo
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0 # Fetch all history for branch comparisons

      - name: Checkout DevOps Tools
        uses: actions/checkout@v6
        with:
          repository: purduerov/pcb-devops
          path: pcb-devops-tools

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run Central Symbol Library Linter
        run: |
          # Locate symbol libraries in the submodule and run the linter
          if [ -d "libs/purdue-rov-kicad-lib/Symbols" ]; then
            find libs/purdue-rov-kicad-lib/Symbols -name "*.kicad_sym" -exec python3 pcb-devops-tools/scripts/linter_validator.py {} +
          else
            echo "No central symbol library submodule found to lint."
          fi

      - name: Fetch Master KiBot Config
        run: |
          cp pcb-devops-tools/kibot_master.yaml local_kibot.yaml

      - name: Resolve KiCad File Names
        id: kicad_files
        run: |
          SCH=$(ls *.kicad_sch 2>/dev/null | head -n 1)
          PCB=$(ls *.kicad_pcb 2>/dev/null | head -n 1)
          if [ -z "$SCH" ]; then echo "ERROR: No .kicad_sch file found!" && exit 1; fi
          if [ -z "$PCB" ]; then echo "ERROR: No .kicad_pcb file found!" && exit 1; fi
          echo "Found schematic: $SCH"
          echo "Found board: $PCB"
          echo "schema=$SCH" >> $GITHUB_OUTPUT
          echo "board=$PCB"  >> $GITHUB_OUTPUT

      - name: Run ERC, DRC, and Exports
        uses: INTI-CMNB/KiBot@v2
        with:
          config: local_kibot.yaml
          dir: Generated_Outputs
          schema: ${{ steps.kicad_files.outputs.schema }}
          board: ${{ steps.kicad_files.outputs.board }}

      - name: Run Component Sourcing Validation
        env:
          MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
          DIGIKEY_CLIENT_ID: ${{ secrets.DIGIKEY_CLIENT_ID }}
          DIGIKEY_CLIENT_SECRET: ${{ secrets.DIGIKEY_CLIENT_SECRET }}
          DIGIKEY_REFRESH_TOKEN: ${{ secrets.DIGIKEY_REFRESH_TOKEN }}
          DIGIKEY_TOKEN_PATH: ${{ github.workspace }}/digikey_token.json
        run: |
          # Find the generated XML BOM and query distributor APIs
          XML_BOM=$(find Generated_Outputs -name "*.xml" | head -n 1)
          if [ -n "$XML_BOM" ] && { [ -n "$MOUSER_API_KEY" ] || [ -n "$DIGIKEY_CLIENT_ID" ]; }; then
            python3 pcb-devops-tools/scripts/fetch_sourcing_bom.py "$XML_BOM"
          else
            echo "Skipping sourcing check: XML BOM or sourcing API credentials not present."
          fi

      - name: Upload Generated Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fabrication-files
          path: Generated_Outputs/
