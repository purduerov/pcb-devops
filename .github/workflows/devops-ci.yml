name: DevOps Tools Validation

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Compile Python Scripts
        run: |
          python3 -m py_compile scripts/fetch_sourcing_bom.py scripts/linter_validator.py

      - name: Validate YAML Syntax
        run: |
          python3 -c "import yaml; yaml.safe_load(open('kibot_master.yaml'))"
